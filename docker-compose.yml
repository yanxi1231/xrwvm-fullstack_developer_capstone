services:
  mongo_db:
    image: mongo:latest
    container_name: mongo_db
    ports:
      - "27017:27017"
    restart: always
    volumes:
      - mongo_data:/data/db

  express_backend:
    build: ./server/database
    container_name: express_backend
    ports:
      - "3030:3030"
    depends_on:
      - mongo_db
    restart: always

  sentiment:
    build: ./server/djangoapp/microservices
    container_name: sentiment
    ports:
      - "5050:5000"
    restart: always

  django:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: django
    ports:
      - "8000:8000"
    depends_on:
      - express_backend
      - sentiment
    environment:
      - backend_url=http://express_backend:3030
      - sentiment_analyzer_url=http://sentiment:5000/
    restart: always

volumes:
  mongo_data: {}
